<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bunseki</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <h1>Bunseki</h1>
          <p>Japanese semantic workbench</p>
        </div>
        <nav class="nav">
          <button class="nav-btn active" data-view="workspace">Workspace</button>
          <button class="nav-btn" data-view="profile">Semantic Profile</button>
          <button class="nav-btn" data-view="kwic">KWIC</button>
          <button class="nav-btn" data-view="lexicon">Lexicon</button>
          <button class="nav-btn" data-view="help">Help</button>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="toolbar">
            <label>Language
              <select id="language">
                <option value="zh">中文</option>
                <option value="ja">日本語</option>
                <option value="en">English</option>
              </select>
            </label>
            <label>Mode
              <select id="mode">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C" selected>C</option>
              </select>
            </label>
            <label>Min Freq
              <input id="min-frequency" type="number" min="1" value="1" />
            </label>
            <button id="analyze-btn" class="primary">Analyze</button>
          </div>
          <div class="status" id="status">Ready</div>
        </header>

        <section class="view active" id="view-workspace">
          <div class="grid workspace-grid">
            <section class="panel">
              <div class="panel-head">
                <h2>Input</h2>
              </div>
              <textarea id="input-text" class="editor"></textarea>
            </section>
            <section class="panel">
              <div class="panel-head">
                <h2>Analysis</h2>
                <div id="summary-strip" class="summary-strip"></div>
              </div>
              <div class="tabs">
                <button class="tab-btn active" data-tab="tokens">Tokens</button>
                <button class="tab-btn" data-tab="lemmas">Lemmas</button>
                <button class="tab-btn" data-tab="domains">Domains</button>
              </div>
              <div class="tab-panel active" id="tab-tokens">
                <table id="tokens-table"></table>
              </div>
              <div class="tab-panel" id="tab-lemmas">
                <table id="lemmas-table"></table>
              </div>
              <div class="tab-panel" id="tab-domains">
                <table id="domains-table"></table>
              </div>
            </section>
          </div>
        </section>

        <section class="view" id="view-profile">
          <div class="grid profile-grid">
            <section class="panel">
              <div class="panel-head"><h2>Domain Profile</h2></div>
              <table id="profile-table"></table>
            </section>
            <section class="panel">
              <div class="panel-head"><h2>Domain Words</h2></div>
              <table id="domain-words-table"></table>
            </section>
            <section class="panel">
              <div class="panel-head"><h2>Summary</h2></div>
              <div id="profile-summary" class="text-card"></div>
            </section>
          </div>
        </section>

        <section class="view" id="view-kwic">
          <div class="panel">
            <div class="panel-head">
              <h2>KWIC</h2>
              <div class="inline-controls">
                <input id="kwic-keyword" placeholder="keyword" />
                <input id="kwic-domain" placeholder="domain" />
                <button id="kwic-refresh">Refresh</button>
              </div>
            </div>
            <table id="kwic-table"></table>
          </div>
          <div class="grid triple-grid">
            <section class="panel"><div class="panel-head"><h2>Previous</h2></div><div id="kwic-prev" class="text-card"></div></section>
            <section class="panel"><div class="panel-head"><h2>Current</h2></div><div id="kwic-current" class="text-card focus"></div></section>
            <section class="panel"><div class="panel-head"><h2>Next</h2></div><div id="kwic-next" class="text-card"></div></section>
          </div>
        </section>

        <section class="view" id="view-lexicon">
          <div class="grid lexicon-grid">
            <section class="panel">
              <div class="panel-head"><h2>Lexicon Domains</h2></div>
              <table id="lexicon-domains-table"></table>
            </section>
            <section class="panel">
              <div class="panel-head">
                <h2>Lexicon Actions</h2>
              </div>
              <div class="form-stack">
                <input id="lexicon-domain-code" placeholder="domain code" />
                <textarea id="lexicon-lemma-batch" placeholder="One lemma per line"></textarea>
                <button id="lexicon-import-btn" class="primary">Import Lemmas</button>
                <div class="hint">Lemma import uses normalized Japanese forms and works well with WLSP-generated lexicon.</div>
              </div>
            </section>
          </div>
        </section>

        <section class="view" id="view-help">
          <section class="panel">
            <div class="panel-head"><h2>Help</h2></div>
            <div id="help-text" class="text-card prose"></div>
          </section>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
